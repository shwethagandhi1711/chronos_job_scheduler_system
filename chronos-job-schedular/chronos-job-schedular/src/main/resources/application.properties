# =========================================================
# APPLICATION CONFIGURATION
# =========================================================

# Name of the Spring Boot application
# Used in logs, monitoring tools, and actuator endpoints
spring.application.name=chronos-job-schedular


# =========================================================
# DATABASE CONFIGURATION (MySQL)
# =========================================================

# JDBC URL for MySQL database connection
# Format:
# jdbc:mysql://<host>:<port>/<database_name>
spring.datasource.url=jdbc:mysql://localhost:3308/chronos_db

# Database username
spring.datasource.username=root

# Database password
spring.datasource.password=Shwetha1308


# =========================================================
# JPA / HIBERNATE CONFIGURATION
# =========================================================

# Hibernate DDL mode
#
# update:
# - Automatically creates/updates tables based on entities
# - Preserves existing data
#
# Other options:
# - create      -> drops & recreates tables (dangerous)
# - create-drop -> drops tables on shutdown
# - validate    -> validates schema only
spring.jpa.hibernate.ddl-auto=update

# Show generated SQL queries in console
# Useful for debugging and learning Hibernate behavior
spring.jpa.show-sql=true


# =========================================================
# QUARTZ SCHEDULER CONFIGURATION
# =========================================================

# Store Quartz jobs and triggers in database instead of memory
#
# jdbc:
# - Enables persistence
# - Required for clustering
# - Jobs survive application restart
spring.quartz.job-store-type=jdbc

# Automatically create Quartz tables in database
#
# always:
# - Creates required Quartz tables at startup
# - Useful during development
#
# In production:
# - Usually set to "never" after tables are created
spring.quartz.jdbc.initialize-schema=always

# Enable Quartz clustering
#
# true:
# - Multiple application instances can share jobs
# - Prevents duplicate job execution
# - Uses database locks internally
spring.quartz.properties.org.quartz.jobStore.isClustered=true
